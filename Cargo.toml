[package]
name = "packrat"
version = "0.1.0"
edition = "2021"
description = "A Wireshark-style network packet analyzer TUI, in the style of binsider"
license = "MIT"
authors = []
repository = ""
keywords = ["network", "packet", "tui", "analyzer", "wireshark"]
categories = ["command-line-utilities", "network-programming"]

[[bin]]
name = "packrat"
path = "src/main.rs"

[dependencies]
ratatui    = "0.29"
crossterm  = "0.28"
rand       = "0.8"
chrono     = { version = "0.4", features = ["clock"] }
anyhow     = "1.0"

# Optional: enable real packet capture
# Requires libpcap (Linux/macOS) or Npcap SDK (Windows) installed first
# Build with: cargo build --release --features real-capture
pcap = { version = "2.0", optional = true }

[features]
default        = []
real-capture   = ["dep:pcap"]

[profile.release]
opt-level = 3
strip = true

[profile.dev]
opt-level = 1
