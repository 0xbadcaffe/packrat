[package]
name = "packrat"
version = "0.2.0"
edition = "2021"
description = "A Wireshark-style network packet analyzer TUI"
license = "MIT"
authors = []

[[bin]]
name = "packrat"
path = "src/main.rs"

[dependencies]
ratatui    = "0.29"
crossterm  = { version = "0.28", features = ["event-stream"] }
tokio      = { version = "1", features = ["full"] }
futures    = "0.3"
rand       = "0.8"
chrono     = { version = "0.4", features = ["clock"] }
anyhow     = "1.0"
dirs-next  = "2.0"
pcap       = { version = "2.0", optional = true }

[features]
default        = []
real-capture   = ["dep:pcap"]

[profile.release]
opt-level = 3
strip = true

[profile.dev]
opt-level = 1
