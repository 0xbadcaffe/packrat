name: ci

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  native:
    name: native-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            real_capture: true
          - os: macos-latest
            real_capture: true
          - os: windows-latest
            real_capture: false

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux capture deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libpcap-dev llvm

      - name: cargo check
        run: cargo check --locked

      - name: cargo test
        run: cargo test --locked

      - name: cargo check --features real-capture
        if: matrix.real_capture
        run: cargo check --locked --features real-capture

      - name: Build eBPF socket program
        if: runner.os == 'Linux'
        run: |
          mkdir -p target/ebpf
          clang -O2 -g -target bpfel -D__TARGET_ARCH_x86 -Wall -Werror -I ebpf \
            -c ebpf/packrat_socket.bpf.c -o target/ebpf/packrat_socket.bpf.o
          llvm-objdump -h target/ebpf/packrat_socket.bpf.o

      - name: Check eBPF collector
        if: runner.os == 'Linux'
        run: cargo check --locked --features ebpf-sockets --bin packrat-socket-collector

  target-matrix:
    name: linux-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - i686-unknown-linux-gnu
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - powerpc64le-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@cross

      - name: cross check
        run: cross check --locked --target ${{ matrix.target }}

  instrumentation:
    name: linux-memory-and-cpu-profile
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -C link-arg=-Wl,--no-rosegment

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: flamegraph

      - name: Install memory and CPU instrumentation
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind linux-tools-common linux-tools-generic
          sudo ln -sf "$(find /usr/lib/linux-tools -type f -name perf | sort -V | tail -1)" /usr/local/bin/perf

      - name: Build symbolized profiling workload
        run: cargo build --locked --profile profiling --bin packrat-profile

      - name: Valgrind memory safety and leak check
        run: |
          valgrind \
            --error-exitcode=1 \
            --leak-check=full \
            --show-leak-kinds=definite,indirect \
            --errors-for-leak-kinds=definite,indirect \
            --track-origins=yes \
            --log-file=target/profiling/valgrind.txt \
            target/profiling/packrat-profile --packets 2000

      - name: Capture CPU profile
        run: |
          echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid
          cargo flamegraph --profile profiling --bin packrat-profile \
            --freq 99 --no-inline \
            --output target/profiling/packrat-flamegraph.svg -- \
            --packets 100000
          perf record --freq 99 --call-graph dwarf \
            --output target/profiling/packrat.perf.data -- \
            target/profiling/packrat-profile --packets 50000
          perf report --stdio --no-children --sort overhead,symbol \
            --input target/profiling/packrat.perf.data \
            > target/profiling/hot-symbols.txt

      - name: Publish profiling triage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packrat-linux-profile
          if-no-files-found: error
          path: |
            target/profiling/valgrind.txt
            target/profiling/hot-symbols.txt
            target/profiling/packrat-flamegraph.svg
